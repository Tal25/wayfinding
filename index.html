<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Waypoint</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap');

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --border: #2a2a2a;
    --accent: #f0c040;
    --accent-dim: #8a6e20;
    --green: #50d080;
    --red: #e05050;
    --text: #f0ece4;
    --text-dim: #888;
    --mono: 'DM Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%; width: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    overflow: hidden;
    user-select: none;
  }

  .shell {
    height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: env(safe-area-inset-top,16px) 0 env(safe-area-inset-bottom,16px);
  }

  /* ── Top ── */
  .topbar {
    flex-shrink: 0;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .wordmark { font-size: 11px; letter-spacing: 0.25em; color: var(--accent); }
  .gps-pill {
    font-size: 10px;
    letter-spacing: 0.1em;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--text-dim);
    transition: all 0.4s;
  }
  .gps-pill.ok  { border-color: var(--green); color: var(--green); }
  .gps-pill.bad { border-color: var(--red);   color: var(--red);   }

  /* ── Centre ── */
  .centre {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    position: relative;
    padding: 20px 28px;
  }

  /* Big distance */
  .dist-wrap { text-align: center; }
  .dist-num {
    font-size: 96px;
    font-weight: 300;
    line-height: 1;
    letter-spacing: -0.04em;
    color: var(--text);
    transition: color 0.6s;
  }
  .dist-num.close { color: var(--green); }
  .dist-unit {
    font-size: 22px;
    color: var(--text-dim);
    font-weight: 300;
    letter-spacing: 0.12em;
    margin-left: 4px;
  }
  .dist-to {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    margin-top: 8px;
    text-transform: uppercase;
  }

  /* Direction */
  .dir-text {
    margin-top: 28px;
    font-size: 15px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-dim);
    min-height: 22px;
    transition: color 0.3s;
    text-align: center;
  }
  .dir-text.ahead { color: var(--green); }
  .dir-text.turn  { color: var(--accent); }

  /* ── Pan visualiser ── */
  .pan-wrap {
    margin-top: 36px;
    width: 100%;
  }
  .pan-labels {
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    letter-spacing: 0.18em;
    color: var(--border);
    margin-bottom: 10px;
  }
  .pan-track {
    width: 100%;
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    position: relative;
  }
  .pan-dot {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--accent);
    position: absolute;
    top: -9px;
    left: 50%;
    transform: translateX(-50%);
    box-shadow: 0 0 16px var(--accent), 0 0 32px rgba(240,192,64,0.3);
    transition: left 0.3s cubic-bezier(0.34,1.4,0.64,1);
  }
  .pan-center {
    position: absolute;
    top: -5px; left: calc(50% - 0.5px);
    width: 1px; height: 12px;
    background: var(--text-dim);
    opacity: 0.3;
  }

  /* Pulse ring around dot */
  .pan-dot::after {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 1px solid var(--accent);
    opacity: 0;
  }
  .pulsing .pan-dot::after {
    animation: ring-pulse 1s ease-out infinite;
  }
  @keyframes ring-pulse {
    0%   { opacity: 0.8; transform: scale(0.8); }
    100% { opacity: 0;   transform: scale(2.2); }
  }

  /* ── Audio level bars (heartbeat viz) ── */
  .audio-viz {
    margin-top: 32px;
    display: flex;
    align-items: flex-end;
    gap: 4px;
    height: 32px;
    justify-content: center;
  }
  .bar {
    width: 4px;
    background: var(--accent-dim);
    border-radius: 2px;
    height: 4px;
    transition: height 0.15s, background 0.3s;
  }
  .pulsing .bar:nth-child(1) { animation: bar-anim 1.1s ease-in-out infinite 0.0s; }
  .pulsing .bar:nth-child(2) { animation: bar-anim 1.1s ease-in-out infinite 0.1s; }
  .pulsing .bar:nth-child(3) { animation: bar-anim 1.1s ease-in-out infinite 0.2s; }
  .pulsing .bar:nth-child(4) { animation: bar-anim 1.1s ease-in-out infinite 0.3s; }
  .pulsing .bar:nth-child(5) { animation: bar-anim 1.1s ease-in-out infinite 0.2s; }
  .pulsing .bar:nth-child(6) { animation: bar-anim 1.1s ease-in-out infinite 0.1s; }
  .pulsing .bar:nth-child(7) { animation: bar-anim 1.1s ease-in-out infinite 0.0s; }
  @keyframes bar-anim {
    0%,100% { height: 4px;  background: var(--accent-dim); }
    50%      { height: 28px; background: var(--accent); }
  }

  /* ── Bottom ── */
  .bottom {
    flex-shrink: 0;
    padding: 12px 24px 8px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .big-btn {
    width: 100%;
    padding: 22px;
    border: none;
    border-radius: 16px;
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s, background 0.4s;
    background: var(--accent);
    color: #000;
    font-weight: 500;
  }
  .big-btn:active { transform: scale(0.97); opacity: 0.85; }
  .big-btn:disabled { opacity: 0.3; }
  .big-btn.stop { background: var(--surface); color: var(--red); border: 1px solid var(--red); }
  .big-btn.done { background: var(--green); color: #000; }

  .info-row {
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    padding: 0 2px;
  }

  /* ── Arrived overlay ── */
  .overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: var(--bg);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 20;
  }
  .overlay.show { display: flex; }
  .overlay-mark {
    font-size: 72px;
    animation: pop 0.6s cubic-bezier(0.34,1.56,0.64,1);
    color: var(--green);
  }
  @keyframes pop { from { transform: scale(0) rotate(-20deg); } to { transform: scale(1) rotate(0); } }
  .overlay-title { font-size: 14px; letter-spacing: 0.25em; color: var(--green); }
  .overlay-sub   { font-size: 11px; letter-spacing: 0.1em;  color: var(--text-dim); margin-top: 4px; }
</style>
</head>
<body>
<div class="shell">

  <div class="topbar">
    <span class="wordmark">WAYPOINT</span>
    <span class="gps-pill" id="gps-pill">LOCATING</span>
  </div>

  <div class="centre" id="centre">

    <div class="dist-wrap" aria-live="polite" aria-atomic="true">
      <span class="dist-num" id="dist-num">—</span><span class="dist-unit" id="dist-unit"></span>
      <div class="dist-to" id="dist-to">to destination</div>
    </div>

    <div class="dir-text" id="dir-text" aria-live="polite"></div>

    <div class="pan-wrap" id="pan-wrap" aria-hidden="true">
      <div class="pan-labels"><span>LEFT ←</span><span>→ RIGHT</span></div>
      <div class="pan-track">
        <div class="pan-center"></div>
        <div class="pan-dot" id="pan-dot"></div>
      </div>
    </div>

    <div class="audio-viz" id="audio-viz" aria-hidden="true">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div>
    </div>

    <div class="overlay" id="overlay" role="alert">
      <div class="overlay-mark">◎</div>
      <div class="overlay-title">ARRIVED</div>
      <div class="overlay-sub">You have reached your destination.</div>
    </div>

  </div>

  <div class="bottom">
    <button class="big-btn" id="main-btn" disabled aria-label="Start navigation">
      START
    </button>
    <div class="info-row">
      <span id="info-coords">—</span>
      <span id="info-bearing">—</span>
    </div>
  </div>

</div>

<script>
/* ══════════════════════════════════════════════════════
   WAYPOINT — 22m Demo
   From: 37.87602423694675, -122.25864729498736
   To:   37.87601674583654, -122.25893426474539
   Distance: ~22m, bearing ~270° (due west)
   ══════════════════════════════════════════════════════ */

const DEST = { lat: 37.87601674583654, lng: -122.25893426474539 };
const ARRIVE_RADIUS = 6; // metres — arrive when within 6m

// ── State ──
const S = {
  pos: null,
  heading: null,
  navigating: false,
  arrived: false,
  ctx: null,
  osc: null,
  oscGain: null,
  panner: null,
  pulseTimer: null,
  tickTimer: null,
  announced: new Set(),
};

// ── DOM ──
const gpsPill    = document.getElementById('gps-pill');
const distNum    = document.getElementById('dist-num');
const distUnit   = document.getElementById('dist-unit');
const dirText    = document.getElementById('dir-text');
const panDot     = document.getElementById('pan-dot');
const panWrap    = document.getElementById('pan-wrap');
const audioViz   = document.getElementById('audio-viz');
const mainBtn    = document.getElementById('main-btn');
const overlay    = document.getElementById('overlay');
const infoCoords  = document.getElementById('info-coords');
const infoBearing = document.getElementById('info-bearing');
const centre      = document.getElementById('centre');

// ════════════════════════════════════════
//  GPS
// ════════════════════════════════════════
navigator.geolocation.watchPosition(
  p => {
    S.pos = { lat: p.coords.latitude, lng: p.coords.longitude, acc: p.coords.accuracy };
    gpsPill.textContent = `GPS ±${Math.round(p.coords.accuracy)}m`;
    gpsPill.className   = p.coords.accuracy < 20 ? 'gps-pill ok' : 'gps-pill';
    mainBtn.disabled    = false;
    infoCoords.textContent = `${p.coords.latitude.toFixed(5)}, ${p.coords.longitude.toFixed(5)}`;
    if (S.navigating) tick();
  },
  e => { gpsPill.textContent = 'GPS ERR'; gpsPill.className = 'gps-pill bad'; },
  { enableHighAccuracy: true, maximumAge: 0, timeout: 20000 }
);

// ════════════════════════════════════════
//  COMPASS
// ════════════════════════════════════════
function attachCompass() {
  window.addEventListener('deviceorientation', e => {
    if (typeof e.webkitCompassHeading === 'number') {
      S.heading = e.webkitCompassHeading;
    } else if (e.alpha !== null) {
      S.heading = (360 - e.alpha) % 360;
    }
    infoBearing.textContent = S.heading != null ? `HDG ${Math.round(S.heading)}°` : '';
    if (S.navigating) tick();
  }, true);
}

// ════════════════════════════════════════
//  AUDIO ENGINE
// ════════════════════════════════════════
function initAudio() {
  if (S.ctx) return;
  S.ctx     = new (window.AudioContext || window.webkitAudioContext)();
  S.osc     = S.ctx.createOscillator();
  S.oscGain = S.ctx.createGain();
  S.panner  = S.ctx.createStereoPanner();

  S.osc.type = 'sine';
  S.osc.frequency.value = 392;
  S.oscGain.gain.value  = 0;

  S.osc.connect(S.oscGain);
  S.oscGain.connect(S.panner);
  S.panner.connect(S.ctx.destination);
  S.osc.start();
}

function distToFreq(dist) {
  // 392 Hz (G4) at 30m → 880 Hz (A5) at 0m
  const t = Math.max(0, Math.min(1, 1 - dist / 30));
  return 392 + t * 488;
}

function distToInterval(dist) {
  // Pulse gap in ms. Returns 0 for continuous tone.
  if (dist > 20) return 2000;
  if (dist > 15) return 1400;
  if (dist > 10) return 900;
  if (dist > 6)  return 500;
  if (dist > 3)  return 250;
  return 0; // continuous
}

function computePan(bearing) {
  if (S.heading == null) return null;
  let diff = bearing - S.heading;
  while (diff >  180) diff -= 360;
  while (diff < -180) diff += 360;
  return Math.max(-1, Math.min(1, diff / 80));
}

let _sweepDir = 1, _sweepPan = 0;
function compasslessSweep() {
  _sweepPan += _sweepDir * 0.04;
  if (_sweepPan >  1) { _sweepPan =  1; _sweepDir = -1; }
  if (_sweepPan < -1) { _sweepPan = -1; _sweepDir =  1; }
  return _sweepPan;
}

function audioTick(dist, pan) {
  if (!S.ctx) return;
  const now = S.ctx.currentTime;

  // Frequency
  S.osc.frequency.setTargetAtTime(distToFreq(dist), now, 0.1);

  // Pan
  const p = pan !== null ? pan : compasslessSweep();
  S.panner.pan.setTargetAtTime(p, now, 0.08);

  // Pan dot
  const pct = ((p + 1) / 2) * 100;
  panDot.style.left = `${pct}%`;

  // Pulse
  const interval = distToInterval(dist);
  if (interval === 0) {
    // Continuous tone — cancel any scheduled pulse
    clearTimeout(S.pulseTimer);
    S.pulseTimer = null;
    S.oscGain.gain.cancelScheduledValues(now);
    S.oscGain.gain.setTargetAtTime(0.25, now, 0.05);
  } else if (!S.pulseTimer) {
    schedulePulse(interval);
  }
}

function schedulePulse(interval) {
  if (!S.navigating || !S.ctx) return;
  const now = S.ctx.currentTime;

  S.oscGain.gain.cancelScheduledValues(now);
  S.oscGain.gain.setValueAtTime(0.001, now);
  S.oscGain.gain.linearRampToValueAtTime(0.28, now + 0.04);
  S.oscGain.gain.exponentialRampToValueAtTime(0.001, now + 0.22);

  S.pulseTimer = setTimeout(() => {
    S.pulseTimer = null;
    if (!S.navigating) return;
    const d  = S.pos ? haversine(S.pos, DEST) : 20;
    const iv = distToInterval(d);
    if (iv === 0) {
      S.oscGain.gain.setTargetAtTime(0.25, S.ctx.currentTime, 0.05);
    } else {
      schedulePulse(iv);
    }
  }, interval);
}

function stopAudio() {
  clearTimeout(S.pulseTimer);
  S.pulseTimer = null;
  if (!S.ctx) return;
  const now = S.ctx.currentTime;
  S.oscGain.gain.cancelScheduledValues(now);
  S.oscGain.gain.setTargetAtTime(0, now, 0.08);
}

// ════════════════════════════════════════
//  NAVIGATION TICK
// ════════════════════════════════════════
function tick() {
  if (!S.navigating || !S.pos) return;

  const dist    = haversine(S.pos, DEST);
  const bearing = getBearing(S.pos, DEST);
  const pan     = computePan(bearing);

  if (dist <= ARRIVE_RADIUS) { arrive(); return; }

  // Distance display
  distNum.textContent  = Math.round(dist);
  distUnit.textContent = ' m';
  distNum.classList.toggle('close', dist < 10);

  // Direction label
  let dir = '', cls = '';
  if (pan === null) {
    dir = 'point phone forward';
  } else if (Math.abs(pan) < 0.12) {
    dir = 'straight ahead'; cls = 'ahead';
  } else if (pan < -0.7) {
    dir = 'turn left';    cls = 'turn';
  } else if (pan < -0.15) {
    dir = 'bear left';    cls = 'turn';
  } else if (pan > 0.7) {
    dir = 'turn right';   cls = 'turn';
  } else {
    dir = 'bear right';   cls = 'turn';
  }
  dirText.textContent = dir;
  dirText.className   = 'dir-text' + (cls ? ' ' + cls : '');

  // Audio
  audioTick(dist, pan);

  // Announcements
  checkAnnouncements(dist);
}

function checkAnnouncements(dist) {
  // For a 22m walk: announce at 20, 15, 10, 5m
  const milestones = [20, 15, 10, 5];
  for (const m of milestones) {
    if (!S.announced.has(m) && dist <= m + 1.5) {
      S.announced.add(m);
      speak(m <= 5 ? 'Almost there.' : `${m} metres remaining.`);
      break;
    }
  }
}

// ════════════════════════════════════════
//  ARRIVE
// ════════════════════════════════════════
function arrive() {
  S.navigating = false;
  S.arrived    = true;
  clearTimeout(S.pulseTimer); S.pulseTimer = null;
  clearInterval(S.tickTimer);

  // Ascending three-note arrival chime
  if (S.ctx) {
    const now = S.ctx.currentTime;
    S.oscGain.gain.setTargetAtTime(0, now, 0.05);
    [[440, 0], [523, 0.35], [659, 0.7]].forEach(([freq, delay]) => {
      const o = S.ctx.createOscillator();
      const g = S.ctx.createGain();
      o.type = 'sine';
      o.frequency.value = freq;
      g.gain.setValueAtTime(0.001, now + delay);
      g.gain.linearRampToValueAtTime(0.22, now + delay + 0.06);
      g.gain.exponentialRampToValueAtTime(0.001, now + delay + 0.55);
      o.connect(g); g.connect(S.ctx.destination);
      o.start(now + delay);
      o.stop(now + delay + 0.65);
    });
  }

  distNum.textContent  = '0';
  distUnit.textContent = ' m';
  panWrap.style.display  = 'none';
  audioViz.style.display = 'none';
  overlay.classList.add('show');
  centre.classList.remove('pulsing');
  mainBtn.textContent = 'ARRIVED ✓';
  mainBtn.classList.remove('stop');
  mainBtn.classList.add('done');
  mainBtn.onclick = () => location.reload();

  setTimeout(() => speak('You have arrived at your destination.'), 800);
}

// ════════════════════════════════════════
//  BUTTON
// ════════════════════════════════════════
mainBtn.addEventListener('click', async () => {
  if (S.arrived)    { location.reload(); return; }
  if (S.navigating) { endNav(); return; }
  await startNav();
});

async function startNav() {
  if (!S.pos) { speak('Still waiting for GPS.'); return; }

  // iOS compass permission — must be inside user gesture
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      const r = await DeviceOrientationEvent.requestPermission();
      if (r === 'granted') attachCompass();
    } catch(e) { attachCompass(); }
  } else {
    attachCompass();
  }

  initAudio();
  if (S.ctx.state === 'suspended') await S.ctx.resume();

  S.navigating = true;
  S.announced  = new Set();

  mainBtn.textContent = 'STOP';
  mainBtn.classList.add('stop');
  centre.classList.add('pulsing');

  const dist = haversine(S.pos, DEST);
  speak(`Navigation started. ${Math.round(dist)} metres to destination. Follow the tone.`);

  // Immediate first tick, then every second as fallback between GPS/compass events
  tick();
  S.tickTimer = setInterval(() => { if (S.navigating) tick(); }, 1000);
}

function endNav() {
  S.navigating = false;
  clearInterval(S.tickTimer);
  stopAudio();
  mainBtn.textContent = 'START';
  mainBtn.classList.remove('stop');
  centre.classList.remove('pulsing');
  dirText.textContent  = '';
  distNum.textContent  = '—';
  distUnit.textContent = '';
}

// ════════════════════════════════════════
//  GEO MATHS
// ════════════════════════════════════════
function haversine(a, b) {
  const R = 6371000;
  const φ1 = a.lat * Math.PI / 180, φ2 = b.lat * Math.PI / 180;
  const dφ = (b.lat - a.lat) * Math.PI / 180;
  const dλ = (b.lng - a.lng) * Math.PI / 180;
  const x  = Math.sin(dφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(dλ/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
}

function getBearing(from, to) {
  const dλ = (to.lng - from.lng) * Math.PI / 180;
  const φ1 = from.lat * Math.PI / 180, φ2 = to.lat * Math.PI / 180;
  const y  = Math.sin(dλ) * Math.cos(φ2);
  const x  = Math.cos(φ1)*Math.sin(φ2) - Math.sin(φ1)*Math.cos(φ2)*Math.cos(dλ);
  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

// ════════════════════════════════════════
//  SPEECH
// ════════════════════════════════════════
function speak(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.95; u.pitch = 1; u.volume = 1;
  speechSynthesis.speak(u);
}
</script>
</body>
</html>
