<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Waypoint → Strada</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #f5f0e8;
    --ink: #1a1612;
    --ink-dim: #6b5f52;
    --ink-faint: #c4b8a8;
    --accent: #c4622d;
    --accent-light: #e8845a;
    --surface: #ede8de;
    --border: #d8d0c0;
    --success: #4a7c59;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    overflow: hidden;
  }

  /* ── Layout ── */
  .shell {
    height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: env(safe-area-inset-top, 0) 0 env(safe-area-inset-bottom, 0);
  }

  /* ── Top strip ── */
  .topbar {
    padding: 18px 24px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 12px;
    flex-shrink: 0;
  }
  .wordmark {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .destination-tag {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-dim);
    letter-spacing: 0.05em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── Centre: big audio visualiser + distance ── */
  .centre {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding: 24px;
    position: relative;
  }

  /* Sonar rings */
  .sonar-wrap {
    position: relative;
    width: 220px;
    height: 220px;
    flex-shrink: 0;
  }
  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1.5px solid var(--accent);
    opacity: 0;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0.2);
  }
  .ring-1 { width: 220px; height: 220px; }
  .ring-2 { width: 160px; height: 160px; }
  .ring-3 { width: 100px; height: 100px; }

  .pulsing .ring-1 { animation: sonar 2s ease-out infinite; }
  .pulsing .ring-2 { animation: sonar 2s ease-out infinite 0.5s; }
  .pulsing .ring-3 { animation: sonar 2s ease-out infinite 1s; }

  @keyframes sonar {
    0%   { opacity: 0.7; transform: translate(-50%,-50%) scale(0.2); }
    100% { opacity: 0;   transform: translate(-50%,-50%) scale(1); }
  }

  /* Direction arrow in centre */
  .arrow-wrap {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 64px; height: 64px;
    display: flex; align-items: center; justify-content: center;
  }
  .arrow {
    width: 0; height: 0;
    border-left: 20px solid transparent;
    border-right: 20px solid transparent;
    border-bottom: 44px solid var(--accent);
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
    opacity: 0;
    filter: drop-shadow(0 2px 8px rgba(196,98,45,0.4));
  }
  .arrow.visible { opacity: 1; }

  /* ── Distance display ── */
  .dist-block {
    margin-top: 32px;
    text-align: center;
  }
  .dist-num {
    font-family: var(--mono);
    font-size: 72px;
    font-weight: 300;
    line-height: 1;
    color: var(--ink);
    letter-spacing: -0.03em;
    transition: color 0.5s;
  }
  .dist-num.close { color: var(--success); }
  .dist-unit {
    font-family: var(--mono);
    font-size: 18px;
    color: var(--ink-dim);
    font-weight: 300;
    letter-spacing: 0.1em;
    margin-left: 4px;
  }
  .dist-label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--ink-faint);
    text-transform: uppercase;
    margin-top: 6px;
  }

  /* ── Direction label ── */
  .direction-label {
    margin-top: 16px;
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.12em;
    color: var(--ink-dim);
    text-transform: uppercase;
    min-height: 18px;
    transition: color 0.3s;
  }
  .direction-label.on-course { color: var(--success); }

  /* ── Pan bar ── */
  .pan-section {
    flex-shrink: 0;
    padding: 0 32px 24px;
  }
  .pan-label-row {
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--ink-faint);
    margin-bottom: 8px;
  }
  .pan-track {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    position: relative;
  }
  .pan-dot {
    width: 18px; height: 18px;
    background: var(--accent);
    border-radius: 50%;
    position: absolute;
    top: -7.5px;
    left: 50%;
    transform: translateX(-50%);
    transition: left 0.35s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 2px 12px rgba(196,98,45,0.5);
  }
  .pan-center-tick {
    position: absolute;
    top: -4px; left: 50%;
    transform: translateX(-50%);
    width: 1px; height: 11px;
    background: var(--ink-faint);
    opacity: 0.4;
  }

  /* ── Bottom button area ── */
  .bottom {
    flex-shrink: 0;
    padding: 0 24px 20px;
  }
  .start-btn {
    width: 100%;
    padding: 20px;
    background: var(--accent);
    color: #fff;
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s, background 0.3s;
    position: relative;
    overflow: hidden;
  }
  .start-btn:active { transform: scale(0.98); opacity: 0.85; }
  .start-btn.navigating { background: var(--ink); }
  .start-btn.arrived { background: var(--success); }

  /* GPS / status strip */
  .status-strip {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--ink-faint);
    text-align: center;
    margin-top: 12px;
    min-height: 14px;
  }
  .status-strip.warn { color: var(--accent); }
  .status-strip.ok { color: var(--success); }

  /* Arrived state */
  .arrived-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(245,240,232,0.95);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    z-index: 10;
  }
  .arrived-overlay.show { display: flex; }
  .arrived-mark {
    font-size: 64px;
    animation: pop 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
  .arrived-text {
    font-family: var(--mono);
    font-size: 15px;
    letter-spacing: 0.15em;
    color: var(--success);
    text-transform: uppercase;
  }
  .arrived-sub {
    font-family: var(--sans);
    font-size: 14px;
    color: var(--ink-dim);
  }
</style>
</head>
<body>
<div class="shell">

  <!-- Top bar -->
  <div class="topbar">
    <span class="wordmark">Waypoint</span>
    <span class="destination-tag">→ Strada Café, Berkeley</span>
  </div>

  <!-- Centre -->
  <div class="centre">
    <!-- Sonar rings -->
    <div class="sonar-wrap" id="sonar">
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>
      <div class="ring ring-3"></div>
      <div class="arrow-wrap">
        <div class="arrow" id="arrow"></div>
      </div>
    </div>

    <!-- Distance -->
    <div class="dist-block" aria-live="polite" aria-atomic="true">
      <span class="dist-num" id="dist-num">—</span><span class="dist-unit" id="dist-unit"></span>
      <div class="dist-label" id="dist-label">to strada café</div>
    </div>

    <!-- Direction text -->
    <div class="direction-label" id="dir-label" aria-live="polite"></div>

    <!-- Arrived overlay -->
    <div class="arrived-overlay" id="arrived-overlay" role="alert">
      <div class="arrived-mark">◎</div>
      <div class="arrived-text">You have arrived</div>
      <div class="arrived-sub">Strada Café</div>
    </div>
  </div>

  <!-- Pan bar -->
  <div class="pan-section" aria-hidden="true">
    <div class="pan-label-row"><span>LEFT</span><span>RIGHT</span></div>
    <div class="pan-track">
      <div class="pan-center-tick"></div>
      <div class="pan-dot" id="pan-dot"></div>
    </div>
  </div>

  <!-- Bottom -->
  <div class="bottom">
    <button class="start-btn" id="start-btn" aria-label="Start navigation to Strada Café">
      START NAVIGATION
    </button>
    <div class="status-strip" id="status-strip">WAITING FOR GPS</div>
  </div>

</div>

<script>
/* ═══════════════════════════════════════════════════
   WAYPOINT — Demo: Current location → Strada Café
   Strada Café: 2300 College Ave, Berkeley, CA
   Coords: 37.86865, -122.25481
   ═══════════════════════════════════════════════════ */

const DEST = { lat: 37.86865, lng: -122.25481, name: 'Strada Café' };

const state = {
  pos: null,
  heading: null,
  route: [],
  stepIndex: 0,
  navigating: false,
  arrived: false,
  audioCtx: null,
  osc: null,
  panNode: null,
  gainNode: null,
  lfoGain: null,
  pulseTimer: null,
  watchId: null,
};

// ── DOM ────────────────────────────────────────
const startBtn    = document.getElementById('start-btn');
const statusStrip = document.getElementById('status-strip');
const distNum     = document.getElementById('dist-num');
const distUnit    = document.getElementById('dist-unit');
const distLabel   = document.getElementById('dist-label');
const dirLabel    = document.getElementById('dir-label');
const panDot      = document.getElementById('pan-dot');
const arrow       = document.getElementById('arrow');
const sonar       = document.getElementById('sonar');
const arrivedOverlay = document.getElementById('arrived-overlay');

// ── GPS ────────────────────────────────────────
function startGPS() {
  if (!navigator.geolocation) {
    setStatus('GPS not available', 'warn');
    return;
  }
  setStatus('ACQUIRING GPS…');
  state.watchId = navigator.geolocation.watchPosition(
    pos => {
      state.pos = { lat: pos.coords.latitude, lng: pos.coords.longitude, acc: pos.coords.accuracy };
      setStatus(`GPS ±${Math.round(pos.coords.accuracy)}m`, 'ok');
      startBtn.disabled = false;
      if (state.navigating) tick();
    },
    err => setStatus('GPS ERROR — check permissions', 'warn'),
    { enableHighAccuracy: true, maximumAge: 1500, timeout: 15000 }
  );
}

// ── Compass ────────────────────────────────────
function startCompass() {
  const handler = e => {
    let h = e.webkitCompassHeading ?? e.alpha;
    if (h == null) return;
    // alpha is counter-clockwise from north on some browsers; webkitCompassHeading is always CW from N
    if (e.webkitCompassHeading == null) h = (360 - h) % 360;
    state.heading = h;
  };

  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    // iOS 13+ — must be triggered on a user gesture; we'll call it on start
    state._compassHandler = handler;
  } else {
    window.addEventListener('deviceorientation', handler, true);
  }
}

async function requestCompassPermission() {
  if (state._compassHandler) {
    try {
      const p = await DeviceOrientationEvent.requestPermission();
      if (p === 'granted') window.addEventListener('deviceorientation', state._compassHandler, true);
    } catch(e) { console.warn('Compass permission denied', e); }
  }
}

// ── Routing (OSRM walking) ─────────────────────
async function fetchRoute() {
  const { lat, lng } = state.pos;
  const url = `https://router.project-osrm.org/route/v1/foot/${lng},${lat};${DEST.lng},${DEST.lat}?geometries=geojson&overview=full`;
  const r = await fetch(url);
  const d = await r.json();
  if (!d.routes?.length) throw new Error('No route');
  return d.routes[0].geometry.coordinates.map(([ln, la]) => ({ lat: la, lng: ln }));
}

// ── Start ──────────────────────────────────────
startBtn.addEventListener('click', async () => {
  if (state.navigating) { stopNav(); return; }
  if (!state.pos) { setStatus('Still waiting for GPS…', 'warn'); return; }

  // iOS compass permission on user gesture
  await requestCompassPermission();

  // Init audio on user gesture (required by browsers)
  initAudio();

  startBtn.textContent = 'FETCHING ROUTE…';
  startBtn.disabled = true;

  try {
    state.route = await fetchRoute();
    state.stepIndex = 0;
    state.navigating = true;
    state.arrived = false;

    startBtn.textContent = 'STOP';
    startBtn.classList.add('navigating');
    startBtn.disabled = false;
    sonar.classList.add('pulsing');
    arrow.classList.add('visible');

    speak(`Starting navigation to Strada Café. ${formatDist(totalRemaining())} remaining.`);
    tick();
    scheduleAnnouncements();
  } catch(e) {
    setStatus('Could not fetch route. Check connection.', 'warn');
    startBtn.textContent = 'START NAVIGATION';
    startBtn.disabled = false;
  }
});

function stopNav() {
  state.navigating = false;
  clearTimeout(state.pulseTimer);
  silenceTone();
  sonar.classList.remove('pulsing');
  arrow.classList.remove('visible');
  startBtn.textContent = 'START NAVIGATION';
  startBtn.classList.remove('navigating');
  distNum.textContent = '—';
  distUnit.textContent = '';
  dirLabel.textContent = '';
  panDot.style.left = '50%';
  clearTimeout(state._announceTimer);
}

// ── Main tick ──────────────────────────────────
function tick() {
  if (!state.navigating || !state.pos) return;

  // Advance stepIndex: skip waypoints we've passed within 15m
  while (
    state.stepIndex < state.route.length - 1 &&
    haversine(state.pos, state.route[state.stepIndex]) < 15
  ) state.stepIndex++;

  if (state.stepIndex >= state.route.length - 1) {
    const finalDist = haversine(state.pos, DEST);
    if (finalDist < 20) { arrive(); return; }
  }

  const target = state.route[state.stepIndex];
  const distToStep = haversine(state.pos, target);
  const totalDist  = totalRemaining();
  const bearing    = getBearing(state.pos, target);
  const pan        = computePan(bearing); // -1 left … +1 right

  // ── UI ──
  updateDistDisplay(totalDist);
  updateDirectionLabel(pan, bearing);
  updateArrow(pan, bearing);
  updatePanDot(pan);

  // ── Audio ──
  updateTone(pan, totalDist, distToStep);
}

// Tick on every GPS update; also poll at 2s for compass-driven pan
setInterval(() => { if (state.navigating && state.pos) tick(); }, 2000);

// ── Distance display ───────────────────────────
function updateDistDisplay(dist) {
  if (dist >= 1000) {
    distNum.textContent = (dist / 1000).toFixed(1);
    distUnit.textContent = 'km';
  } else {
    distNum.textContent = Math.round(dist);
    distUnit.textContent = 'm';
  }
  distNum.classList.toggle('close', dist < 50);
}

function formatDist(dist) {
  return dist >= 1000 ? `${(dist/1000).toFixed(1)} kilometres` : `${Math.round(dist)} metres`;
}

// ── Direction label & arrow ────────────────────
function updateDirectionLabel(pan, bearing) {
  let txt, cls = '';
  if (state.heading == null) {
    txt = 'point phone forward';
  } else if (Math.abs(pan) < 0.15) {
    txt = 'straight ahead'; cls = 'on-course';
  } else if (pan < -0.6) {
    txt = 'turn left';
  } else if (pan < -0.15) {
    txt = 'bear left';
  } else if (pan > 0.6) {
    txt = 'turn right';
  } else {
    txt = 'bear right';
  }
  dirLabel.textContent = txt;
  dirLabel.className = 'direction-label' + (cls ? ' ' + cls : '');
}

function updateArrow(pan) {
  // Rotate arrow to match pan (-90° = hard left, 0 = straight, +90° = hard right)
  const deg = pan * 75;
  arrow.style.transform = `rotate(${deg}deg)`;
}

function updatePanDot(pan) {
  const pct = ((pan + 1) / 2) * 100;
  panDot.style.left = `${pct}%`;
}

// ── Audio engine ───────────────────────────────
function initAudio() {
  if (state.audioCtx) return;
  state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // Oscillator (sine) → panner → gain → out
  state.osc     = state.audioCtx.createOscillator();
  state.panNode = state.audioCtx.createStereoPanner();
  state.gainNode = state.audioCtx.createGain();

  state.osc.type = 'sine';
  state.osc.frequency.value = 440;
  state.osc.connect(state.panNode);
  state.panNode.connect(state.gainNode);
  state.gainNode.connect(state.audioCtx.destination);
  state.gainNode.gain.value = 0;
  state.osc.start();
}

function updateTone(pan, totalDist, distToStep) {
  if (!state.audioCtx) return;
  const ctx = state.audioCtx;
  const now = ctx.currentTime;

  // Pitch: 330 Hz when 500m+ away → 880 Hz when <10m
  const t = Math.max(0, Math.min(1, (500 - totalDist) / 490));
  const freq = 330 + t * 550;
  state.osc.frequency.setTargetAtTime(freq, now, 0.15);

  // Pan
  state.panNode.pan.setTargetAtTime(pan, now, 0.15);

  // Pulse interval: slow (2.5s) when far, fast (0.35s) when close
  const interval = 350 + (1 - t) * 2150; // ms

  // Trigger pulse
  clearTimeout(state.pulseTimer);
  firePulse(interval);
}

function firePulse(interval) {
  if (!state.navigating || !state.audioCtx) return;
  const ctx = state.audioCtx;
  const now = ctx.currentTime;
  // Short blip: ramp up then down in 150ms
  state.gainNode.gain.cancelScheduledValues(now);
  state.gainNode.gain.setValueAtTime(0.001, now);
  state.gainNode.gain.linearRampToValueAtTime(0.22, now + 0.06);
  state.gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.18);

  state.pulseTimer = setTimeout(() => firePulse(interval), interval);
}

function silenceTone() {
  if (!state.gainNode || !state.audioCtx) return;
  const now = state.audioCtx.currentTime;
  state.gainNode.gain.cancelScheduledValues(now);
  state.gainNode.gain.setTargetAtTime(0, now, 0.05);
}

// ── Voice announcements ────────────────────────
const ANNOUNCE_DISTS = [500, 300, 200, 100, 50, 20];
const announced = new Set();

function scheduleAnnouncements() {
  announced.clear();
  (function check() {
    if (!state.navigating) return;
    const d = totalRemaining();
    for (const m of ANNOUNCE_DISTS) {
      if (!announced.has(m) && d <= m + 12 && d >= m - 20) {
        announced.add(m);
        if (m <= 20) speak('Destination very close. Arriving now.');
        else speak(`${formatDist(m)} to Strada Café.`);
      }
    }
    state._announceTimer = setTimeout(check, 4000);
  })();
}

function speak(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 1.0; u.pitch = 1.0; u.volume = 1.0;
  speechSynthesis.speak(u);
}

// ── Arrive ─────────────────────────────────────
function arrive() {
  state.navigating = false;
  state.arrived = true;
  clearTimeout(state.pulseTimer);
  clearTimeout(state._announceTimer);
  silenceTone();
  sonar.classList.remove('pulsing');
  arrivedOverlay.classList.add('show');
  startBtn.textContent = 'ARRIVED ✓';
  startBtn.classList.remove('navigating');
  startBtn.classList.add('arrived');
  distNum.textContent = '0';
  distUnit.textContent = 'm';
  speak('You have arrived at Strada Café.');
}

// ── Geo maths ──────────────────────────────────
function haversine(a, b) {
  const R = 6371000;
  const dLat = (b.lat - a.lat) * Math.PI / 180;
  const dLng = (b.lng - a.lng) * Math.PI / 180;
  const sinDlat = Math.sin(dLat / 2);
  const sinDlng = Math.sin(dLng / 2);
  const x = sinDlat*sinDlat + Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*sinDlng*sinDlng;
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x));
}

function getBearing(from, to) {
  const dLng = (to.lng - from.lng) * Math.PI / 180;
  const φ1 = from.lat * Math.PI / 180, φ2 = to.lat * Math.PI / 180;
  const y = Math.sin(dLng) * Math.cos(φ2);
  const x = Math.cos(φ1)*Math.sin(φ2) - Math.sin(φ1)*Math.cos(φ2)*Math.cos(dLng);
  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

function computePan(bearing) {
  if (state.heading == null) return 0; // no compass → center tone
  let diff = bearing - state.heading;
  while (diff > 180) diff -= 360;
  while (diff < -180) diff += 360;
  // ±90° maps to full ±1 pan, clamped
  return Math.max(-1, Math.min(1, diff / 90));
}

function totalRemaining() {
  if (!state.pos || !state.route.length) return 0;
  let d = haversine(state.pos, state.route[state.stepIndex]);
  for (let i = state.stepIndex; i < state.route.length - 1; i++) {
    d += haversine(state.route[i], state.route[i + 1]);
  }
  return d;
}

// ── Status ─────────────────────────────────────
function setStatus(msg, type = '') {
  statusStrip.textContent = msg;
  statusStrip.className = 'status-strip' + (type ? ' ' + type : '');
}

// ── Boot ───────────────────────────────────────
startBtn.disabled = true;
startCompass();
startGPS();
</script>
</body>
</html>
