<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Waypoint — Audio Navigation</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --accent: #4fc3f7;
    --accent2: #81d4fa;
    --warn: #ffb74d;
    --success: #69f0ae;
    --danger: #ef5350;
    --text: #e8eaf6;
    --text-dim: #7986cb;
    --text-faint: #3d4070;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .logo {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--accent);
  }

  .logo span { color: var(--text-dim); font-weight: 300; }

  .status-pill {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--text-dim);
    transition: all 0.3s;
  }
  .status-pill.active { border-color: var(--success); color: var(--success); }
  .status-pill.navigating { border-color: var(--accent); color: var(--accent); animation: pulse-border 2s infinite; }

  @keyframes pulse-border {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* ── Main content area ── */
  main {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 0 20px 100px;
    -webkit-overflow-scrolling: touch;
  }

  /* ── Search section ── */
  .search-section { padding: 20px 0 0; }

  .field-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .search-wrap {
    position: relative;
    margin-bottom: 12px;
  }

  .search-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--sans);
    font-size: 17px;
    font-weight: 400;
    padding: 16px 50px 16px 16px;
    border-radius: 12px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-faint); }

  .search-icon {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.4;
    font-size: 18px;
    pointer-events: none;
  }

  #suggestions {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-top: 4px;
    display: none;
  }

  .suggestion-item {
    padding: 14px 16px;
    font-size: 15px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
    line-height: 1.3;
  }
  .suggestion-item:last-child { border-bottom: none; }
  .suggestion-item:active { background: var(--border); }
  .suggestion-item .s-name { font-weight: 500; }
  .suggestion-item .s-addr { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

  .go-btn {
    width: 100%;
    background: var(--accent);
    color: #000;
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.12em;
    padding: 18px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .go-btn:active { opacity: 0.8; transform: scale(0.98); }
  .go-btn:disabled { opacity: 0.3; }

  /* ── Nav status card ── */
  #nav-card {
    margin-top: 24px;
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 16px;
    padding: 20px;
    display: none;
  }

  .nav-distance {
    font-family: var(--mono);
    font-size: 48px;
    font-weight: 600;
    color: var(--accent);
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .nav-distance span { font-size: 20px; font-weight: 300; color: var(--text-dim); margin-left: 4px; }

  .nav-instruction {
    font-size: 18px;
    font-weight: 500;
    margin-top: 10px;
    line-height: 1.4;
  }

  .nav-step-detail {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 6px;
  }

  /* Audio viz */
  .tone-viz {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 16px;
  }
  .tone-label { font-family: var(--mono); font-size: 10px; color: var(--text-dim); letter-spacing: 0.1em; }
  .pan-bar-wrap {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    position: relative;
    overflow: visible;
  }
  .pan-indicator {
    width: 14px;
    height: 14px;
    background: var(--accent);
    border-radius: 50%;
    position: absolute;
    top: -4px;
    left: 50%;
    transform: translateX(-50%);
    transition: left 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 0 8px var(--accent);
  }

  .stop-btn {
    width: 100%;
    background: transparent;
    color: var(--danger);
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.1em;
    padding: 14px;
    border: 1px solid var(--danger);
    border-radius: 12px;
    cursor: pointer;
    margin-top: 16px;
    transition: background 0.2s;
    text-transform: uppercase;
  }
  .stop-btn:active { background: rgba(239,83,80,0.1); }

  /* ── Location card ── */
  #location-card {
    margin-top: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 20px;
  }

  .loc-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .loc-coords {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-dim);
  }
  .loc-address {
    font-size: 15px;
    font-weight: 400;
    margin-top: 6px;
    line-height: 1.4;
    color: var(--text);
  }
  .loc-accuracy {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-faint);
    margin-top: 4px;
  }

  /* ── Section headers ── */
  .section-head {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin: 28px 0 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-head::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── Saved / Nearby cards ── */
  .card-list { display: flex; flex-direction: column; gap: 8px; }

  .place-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.15s;
  }
  .place-card:active { background: var(--border); }
  .place-card.saved-card { border-left: 3px solid var(--accent2); }
  .place-card.nearby-card { border-left: 3px solid var(--success); }

  .place-icon {
    font-size: 22px;
    flex-shrink: 0;
    width: 36px;
    text-align: center;
  }
  .place-info { flex: 1; min-width: 0; }
  .place-name { font-weight: 500; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .place-sub { font-family: var(--mono); font-size: 11px; color: var(--text-dim); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .place-action {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 0.08em;
    flex-shrink: 0;
  }

  .empty-msg {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-faint);
    padding: 16px 0;
  }

  /* ── Bottom tab bar ── */
  nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    padding-bottom: env(safe-area-inset-bottom, 0px);
    z-index: 100;
  }

  .tab {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px 4px 10px;
    cursor: pointer;
    transition: color 0.2s;
    color: var(--text-faint);
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    gap: 4px;
    border: none;
    background: none;
    -webkit-appearance: none;
  }
  .tab.active { color: var(--accent); }
  .tab-icon { font-size: 22px; }

  /* ── Pages ── */
  .page { display: none; }
  .page.active { display: block; }

  /* Compass */
  #compass-ring {
    margin: 20px auto 0;
    width: 180px;
    height: 180px;
    position: relative;
  }
  #compass-ring svg { width: 100%; height: 100%; }
  .compass-needle {
    transform-origin: center;
    transition: transform 0.3s ease;
  }
  .heading-display {
    text-align: center;
    font-family: var(--mono);
    font-size: 36px;
    font-weight: 600;
    color: var(--accent);
    margin-top: 12px;
  }
  .heading-cardinal {
    text-align: center;
    font-family: var(--mono);
    font-size: 14px;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    margin-top: 2px;
  }

  /* toast */
  #toast {
    position: fixed;
    top: 70px;
    left: 20px; right: 20px;
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 10px;
    padding: 12px 16px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    text-align: center;
    z-index: 999;
    opacity: 0;
    transform: translateY(-8px);
    transition: all 0.25s;
    pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateY(0); }

  /* Spinner */
  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Explore toggle */
  .explore-type-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin: 12px 0;
  }
  .type-chip {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 7px 14px;
    border: 1px solid var(--border);
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text-dim);
    background: none;
  }
  .type-chip.active { border-color: var(--success); color: var(--success); background: rgba(105,240,174,0.07); }
  .type-chip:active { opacity: 0.7; }
</style>
</head>
<body aria-label="Waypoint navigation app">

<header>
  <div class="logo">WAY<span>POINT</span></div>
  <div class="status-pill" id="status-pill">LOCATING</div>
</header>

<div id="toast" role="alert" aria-live="assertive"></div>

<!-- ══════════════ PAGE: Navigate ══════════════ -->
<main id="page-nav" class="page active" role="main" aria-label="Navigation">
  <section class="search-section" aria-label="Destination search">
    <div class="field-label">Destination</div>
    <div class="search-wrap">
      <input
        type="text"
        class="search-input"
        id="dest-input"
        placeholder="Enter address or place name"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
        aria-label="Enter destination"
        aria-autocomplete="list"
        aria-controls="suggestions"
      >
      <span class="search-icon" aria-hidden="true">⌖</span>
    </div>
    <div id="suggestions" role="listbox" aria-label="Address suggestions"></div>
    <button class="go-btn" id="go-btn" aria-label="Start navigation" disabled>START NAVIGATION</button>
  </section>

  <!-- Active nav card -->
  <div id="nav-card" role="region" aria-label="Navigation status" aria-live="polite">
    <div class="nav-distance" id="nav-dist">—<span>m</span></div>
    <div class="nav-instruction" id="nav-instr">Calculating route…</div>
    <div class="nav-step-detail" id="nav-detail"></div>
    <div class="tone-viz" aria-hidden="true">
      <span class="tone-label">L</span>
      <div class="pan-bar-wrap"><div class="pan-indicator" id="pan-dot"></div></div>
      <span class="tone-label">R</span>
    </div>
    <button class="stop-btn" id="stop-btn" aria-label="Stop navigation">■ STOP NAVIGATION</button>
  </div>

  <!-- Current location -->
  <div id="location-card" aria-label="Current location" aria-live="polite">
    <div class="field-label">You are here</div>
    <div class="loc-row">
      <div class="loc-coords" id="loc-coords">Acquiring GPS…</div>
    </div>
    <div class="loc-address" id="loc-address"></div>
    <div class="loc-accuracy" id="loc-accuracy"></div>
  </div>
</main>

<!-- ══════════════ PAGE: Compass ══════════════ -->
<main id="page-compass" class="page" role="main" aria-label="Compass and orientation">
  <div id="compass-ring">
    <svg viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="90" cy="90" r="86" stroke="#1e1e2e" stroke-width="2"/>
      <circle cx="90" cy="90" r="72" stroke="#1e1e2e" stroke-width="1" stroke-dasharray="4 8"/>
      <!-- Cardinal ticks -->
      <line x1="90" y1="4" x2="90" y2="22" stroke="#4fc3f7" stroke-width="3" stroke-linecap="round"/>
      <line x1="90" y1="158" x2="90" y2="176" stroke="#3d4070" stroke-width="2" stroke-linecap="round"/>
      <line x1="4" y1="90" x2="22" y2="90" stroke="#3d4070" stroke-width="2" stroke-linecap="round"/>
      <line x1="158" y1="90" x2="176" y2="90" stroke="#3d4070" stroke-width="2" stroke-linecap="round"/>
      <!-- Labels -->
      <text x="90" y="36" text-anchor="middle" fill="#4fc3f7" font-family="IBM Plex Mono" font-size="13" font-weight="600">N</text>
      <text x="90" y="155" text-anchor="middle" fill="#3d4070" font-family="IBM Plex Mono" font-size="11">S</text>
      <text x="28" y="94" text-anchor="middle" fill="#3d4070" font-family="IBM Plex Mono" font-size="11">W</text>
      <text x="152" y="94" text-anchor="middle" fill="#3d4070" font-family="IBM Plex Mono" font-size="11">E</text>
      <!-- Needle -->
      <g class="compass-needle" id="compass-needle">
        <polygon points="90,20 85,90 90,100 95,90" fill="#4fc3f7" opacity="0.9"/>
        <polygon points="90,100 85,90 90,160 95,90" fill="#3d4070" opacity="0.7"/>
        <circle cx="90" cy="90" r="5" fill="#0a0a0f" stroke="#4fc3f7" stroke-width="2"/>
      </g>
    </svg>
  </div>
  <div class="heading-display" id="heading-num" aria-live="polite">—°</div>
  <div class="heading-cardinal" id="heading-cardinal">AWAITING COMPASS</div>

  <div id="location-card" style="margin-top:20px" aria-label="Current location">
    <div class="field-label">Current position</div>
    <div class="loc-coords" id="compass-coords">—</div>
    <div class="loc-address" id="compass-address"></div>
  </div>
</main>

<!-- ══════════════ PAGE: Saved ══════════════ -->
<main id="page-saved" class="page" role="main" aria-label="Saved destinations">
  <div class="section-head">Saved places</div>
  <div class="card-list" id="saved-list">
    <div class="empty-msg">No saved places yet.<br>Search a destination and save it.</div>
  </div>
</main>

<!-- ══════════════ PAGE: Explore ══════════════ -->
<main id="page-explore" class="page" role="main" aria-label="Explore nearby places">
  <div class="section-head">Nearby</div>
  <div class="explore-type-bar" role="group" aria-label="Category filter">
    <button class="type-chip active" data-type="amenity=cafe" aria-pressed="true">☕ Cafés</button>
    <button class="type-chip" data-type="amenity=restaurant" aria-pressed="false">🍽 Food</button>
    <button class="type-chip" data-type="amenity=pharmacy" aria-pressed="false">💊 Pharmacy</button>
    <button class="type-chip" data-type="amenity=bank" aria-pressed="false">🏦 Bank</button>
    <button class="type-chip" data-type="amenity=bus_stop" aria-pressed="false">🚌 Transit</button>
    <button class="type-chip" data-type="shop=supermarket" aria-pressed="false">🛒 Grocery</button>
  </div>
  <button class="go-btn" id="explore-btn" style="margin-bottom:16px">FIND NEARBY</button>
  <div class="card-list" id="nearby-list"></div>
</main>

<!-- Bottom nav -->
<nav role="tablist" aria-label="App sections">
  <button class="tab active" data-page="page-nav" role="tab" aria-selected="true" aria-label="Navigate">
    <span class="tab-icon" aria-hidden="true">⌖</span>Navigate
  </button>
  <button class="tab" data-page="page-compass" role="tab" aria-selected="false" aria-label="Compass">
    <span class="tab-icon" aria-hidden="true">◎</span>Compass
  </button>
  <button class="tab" data-page="page-saved" role="tab" aria-selected="false" aria-label="Saved places">
    <span class="tab-icon" aria-hidden="true">◈</span>Saved
  </button>
  <button class="tab" data-page="page-explore" role="tab" aria-selected="false" aria-label="Explore nearby">
    <span class="tab-icon" aria-hidden="true">◉</span>Explore
  </button>
</nav>

<script>
/* ═══════════════════════════════════════════════
   WAYPOINT — Spatial Audio Navigation
   ═══════════════════════════════════════════════ */

// ── State ──────────────────────────────────────
const state = {
  pos: null,          // { lat, lng, accuracy }
  heading: null,      // degrees 0–360
  destination: null,  // { lat, lng, name }
  route: [],          // array of { lat, lng }
  stepIndex: 0,
  navigating: false,
  watchId: null,
  audioCtx: null,
  oscillator: null,
  panNode: null,
  gainNode: null,
  toneActive: false,
  lastSpokenDist: null,
};

// ── DOM refs ───────────────────────────────────
const $ = id => document.getElementById(id);
const destInput = $('dest-input');
const suggestions = $('suggestions');
const goBtn = $('go-btn');
const navCard = $('nav-card');
const navDist = $('nav-dist');
const navInstr = $('nav-instr');
const navDetail = $('nav-detail');
const panDot = $('pan-dot');
const stopBtn = $('stop-btn');
const statusPill = $('status-pill');

// ── Toast ──────────────────────────────────────
let toastTimer;
function toast(msg, dur = 2800) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), dur);
}

// ── Tab navigation ─────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => { t.classList.remove('active'); t.setAttribute('aria-selected','false'); });
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    tab.setAttribute('aria-selected','true');
    $(tab.dataset.page).classList.add('active');
  });
});

// ── Geolocation ────────────────────────────────
function startGPS() {
  if (!navigator.geolocation) { toast('GPS not available on this device'); return; }
  state.watchId = navigator.geolocation.watchPosition(
    onPosition,
    err => { statusPill.textContent = 'GPS ERROR'; console.warn(err); },
    { enableHighAccuracy: true, maximumAge: 1000, timeout: 10000 }
  );
}

function onPosition(pos) {
  state.pos = { lat: pos.coords.latitude, lng: pos.coords.longitude, accuracy: pos.coords.accuracy };
  statusPill.textContent = 'READY';
  statusPill.className = 'status-pill active';
  updateLocationDisplay();
  if (state.navigating) updateNavigation();
}

function updateLocationDisplay() {
  if (!state.pos) return;
  const { lat, lng, accuracy } = state.pos;
  const coordStr = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
  if ($('loc-coords')) $('loc-coords').textContent = coordStr;
  if ($('compass-coords')) $('compass-coords').textContent = coordStr;
  if ($('loc-accuracy')) $('loc-accuracy').textContent = `GPS accuracy ±${Math.round(accuracy)}m`;

  // Reverse geocode (debounced)
  clearTimeout(updateLocationDisplay._timer);
  updateLocationDisplay._timer = setTimeout(() => reverseGeocode(lat, lng), 3000);
}

async function reverseGeocode(lat, lng) {
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`, {
      headers: { 'Accept-Language': 'en' }
    });
    const d = await r.json();
    const addr = d.display_name || '';
    const short = addr.split(',').slice(0, 3).join(', ');
    if ($('loc-address')) $('loc-address').textContent = short;
    if ($('compass-address')) $('compass-address').textContent = short;
  } catch(e) { /* silent fail */ }
}

// ── Compass ────────────────────────────────────
function startCompass() {
  const handler = e => {
    let h = e.alpha !== null ? e.alpha : null;
    if (h === null) return;
    // webkitCompassHeading is more accurate on iOS
    if (typeof e.webkitCompassHeading !== 'undefined') h = e.webkitCompassHeading;
    state.heading = h;
    const needle = $('compass-needle');
    if (needle) needle.style.transform = `rotate(${-h}deg)`;
    if ($('heading-num')) $('heading-num').textContent = `${Math.round(h)}°`;
    if ($('heading-cardinal')) $('heading-cardinal').textContent = toCardinal(h);
  };

  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    // iOS 13+
    DeviceOrientationEvent.requestPermission()
      .then(p => { if (p === 'granted') window.addEventListener('deviceorientation', handler); })
      .catch(console.warn);
  } else {
    window.addEventListener('deviceorientation', handler);
  }
}

function toCardinal(deg) {
  const dirs = ['NORTH','NE','EAST','SE','SOUTH','SW','WEST','NW'];
  return dirs[Math.round(deg / 45) % 8];
}

// ── Address Search (Nominatim) ─────────────────
let searchTimer;
destInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  const q = destInput.value.trim();
  if (q.length < 3) { suggestions.style.display = 'none'; return; }
  searchTimer = setTimeout(() => geocodeSearch(q), 400);
});

async function geocodeSearch(q) {
  try {
    const r = await fetch(
      `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=5&addressdetails=1`,
      { headers: { 'Accept-Language': 'en' } }
    );
    const results = await r.json();
    renderSuggestions(results);
  } catch(e) { suggestions.style.display = 'none'; }
}

function renderSuggestions(results) {
  if (!results.length) { suggestions.style.display = 'none'; return; }
  suggestions.innerHTML = results.map((r, i) => {
    const parts = r.display_name.split(',');
    const name = parts[0].trim();
    const addr = parts.slice(1, 3).join(',').trim();
    return `<div class="suggestion-item" role="option" tabindex="0" data-lat="${r.lat}" data-lng="${r.lon}" data-name="${r.display_name}">
      <div class="s-name">${name}</div>
      <div class="s-addr">${addr}</div>
    </div>`;
  }).join('');
  suggestions.style.display = 'block';

  suggestions.querySelectorAll('.suggestion-item').forEach(item => {
    item.addEventListener('click', () => selectDestination(item));
    item.addEventListener('keydown', e => { if (e.key === 'Enter') selectDestination(item); });
  });
}

function selectDestination(item) {
  state.destination = {
    lat: parseFloat(item.dataset.lat),
    lng: parseFloat(item.dataset.lng),
    name: item.dataset.name
  };
  const parts = item.dataset.name.split(',');
  destInput.value = parts.slice(0, 2).join(', ');
  suggestions.style.display = 'none';
  goBtn.disabled = false;
  goBtn.setAttribute('aria-label', `Start navigation to ${parts[0]}`);
}

destInput.addEventListener('blur', () => setTimeout(() => { suggestions.style.display = 'none'; }, 200));

// ── Routing (OSRM) ─────────────────────────────
goBtn.addEventListener('click', async () => {
  if (!state.pos) { toast('Waiting for GPS signal…'); return; }
  if (!state.destination) { toast('Please select a destination'); return; }
  await startNavigation();
});

async function startNavigation() {
  // Request audio context on user gesture
  initAudio();

  statusPill.textContent = 'ROUTING';
  statusPill.className = 'status-pill navigating';
  goBtn.disabled = true;
  goBtn.innerHTML = '<span class="spinner"></span>ROUTING…';

  try {
    const { lat: sLat, lng: sLng } = state.pos;
    const { lat: dLat, lng: dLng, name } = state.destination;
    const url = `https://router.project-osrm.org/route/v1/foot/${sLng},${sLat};${dLng},${dLat}?steps=true&geometries=geojson&overview=full`;
    const r = await fetch(url);
    const data = await r.json();

    if (!data.routes || !data.routes.length) throw new Error('No route found');

    const route = data.routes[0];
    // Extract waypoints from geometry
    state.route = route.geometry.coordinates.map(([lng, lat]) => ({ lat, lng }));
    state.stepIndex = 0;
    state.navigating = true;

    // Save to history
    saveDestination(state.destination);

    showNavCard(name);
    announceStep();

  } catch(e) {
    toast('Could not calculate route. Check your connection.');
    console.error(e);
  } finally {
    goBtn.disabled = false;
    goBtn.textContent = 'START NAVIGATION';
  }
}

function showNavCard(name) {
  navCard.style.display = 'block';
  navInstr.textContent = `Navigating to ${name.split(',')[0]}`;
}

// ── Navigation loop ────────────────────────────
function updateNavigation() {
  if (!state.navigating || !state.pos || state.route.length === 0) return;

  // Find closest upcoming waypoint
  const { lat, lng } = state.pos;
  let minDist = Infinity;
  let nextIdx = state.stepIndex;

  for (let i = state.stepIndex; i < Math.min(state.stepIndex + 30, state.route.length); i++) {
    const d = haversine(lat, lng, state.route[i].lat, state.route[i].lng);
    if (d < minDist) { minDist = d; nextIdx = i; }
  }

  // Advance step if within 12m
  if (minDist < 12 && nextIdx < state.route.length - 1) {
    state.stepIndex = nextIdx + 1;
  }

  if (state.stepIndex >= state.route.length - 1) {
    // Arrived
    arriveDestination();
    return;
  }

  const target = state.route[state.stepIndex];
  const distToNext = haversine(lat, lng, target.lat, target.lng);
  const totalDist = remainingDistance();
  const bearing = getBearing(lat, lng, target.lat, target.lng);
  const pan = computePan(bearing);

  // Update UI
  navDist.innerHTML = totalDist >= 1000
    ? `${(totalDist/1000).toFixed(1)}<span>km</span>`
    : `${Math.round(totalDist)}<span>m</span>`;

  const turnDir = getTurnDescription(bearing);
  navDetail.textContent = `Next waypoint ${Math.round(distToNext)}m · ${turnDir}`;

  // Pan dot (0 = left, 100 = right)
  const panPct = (pan + 1) / 2 * 100;
  panDot.style.left = `${panPct}%`;

  // Audio tone
  updateTone(pan, distToNext);

  // Voice announcements
  announceStep(distToNext, totalDist);
}

function remainingDistance() {
  let d = 0;
  const { lat, lng } = state.pos;
  d += haversine(lat, lng, state.route[state.stepIndex].lat, state.route[state.stepIndex].lng);
  for (let i = state.stepIndex; i < state.route.length - 1; i++) {
    d += haversine(state.route[i].lat, state.route[i].lng, state.route[i+1].lat, state.route[i+1].lng);
  }
  return d;
}

function getTurnDescription(bearing) {
  if (!state.heading) return '';
  let diff = bearing - state.heading;
  while (diff > 180) diff -= 360;
  while (diff < -180) diff += 360;
  if (Math.abs(diff) < 15) return 'straight ahead';
  if (diff > 0 && diff < 60) return 'slight right';
  if (diff > 60) return 'turn right';
  if (diff < 0 && diff > -60) return 'slight left';
  return 'turn left';
}

let lastAnnounce = 0;
let announcedMilestones = new Set();
function announceStep(distToNext, totalDist) {
  if (!totalDist) return;
  const now = Date.now();
  // Announce at 500m, 200m, 100m, 50m
  const milestones = [500, 200, 100, 50];
  for (const m of milestones) {
    if (totalDist <= m + 10 && totalDist >= m - 10 && !announcedMilestones.has(m)) {
      announcedMilestones.add(m);
      speak(`${m} meters to destination`);
      break;
    }
  }
}

function arriveDestination() {
  state.navigating = false;
  stopTone();
  navDist.innerHTML = `0<span>m</span>`;
  navInstr.textContent = `You have arrived`;
  navDetail.textContent = state.destination.name.split(',')[0];
  speak('You have arrived at your destination');
  statusPill.textContent = 'ARRIVED';
  statusPill.className = 'status-pill active';
  toast('You have arrived! ✓');
  announcedMilestones.clear();
}

stopBtn.addEventListener('click', stopNavigation);
function stopNavigation() {
  state.navigating = false;
  state.route = [];
  state.stepIndex = 0;
  stopTone();
  navCard.style.display = 'none';
  statusPill.textContent = 'READY';
  statusPill.className = 'status-pill active';
  announcedMilestones.clear();
}

// ── Audio Engine ───────────────────────────────
function initAudio() {
  if (state.audioCtx) return;
  state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function updateTone(pan, dist) {
  if (!state.audioCtx) return;

  // Tone pulses: faster pulse as you get closer
  // Continuous tone with panning and pitch
  const baseFreq = 440;
  // Pitch rises as you approach (880 when 0m, 440 when 200m+)
  const freq = baseFreq + Math.max(0, (200 - dist) / 200) * 440;

  if (!state.oscillator) {
    state.oscillator = state.audioCtx.createOscillator();
    state.panNode = state.audioCtx.createStereoPanner();
    state.gainNode = state.audioCtx.createGain();
    state.oscillator.type = 'sine';
    state.oscillator.connect(state.panNode);
    state.panNode.connect(state.gainNode);
    state.gainNode.connect(state.audioCtx.destination);
    state.gainNode.gain.value = 0;
    state.oscillator.start();
    state.toneActive = true;
  }

  const now = state.audioCtx.currentTime;
  state.oscillator.frequency.setTargetAtTime(freq, now, 0.1);
  state.panNode.pan.setTargetAtTime(pan, now, 0.1);

  // Pulse pattern: beep for 120ms every N ms (faster when closer)
  if (!state._pulseTimer) {
    pulseTone();
  }
}

function pulseTone() {
  if (!state.navigating || !state.audioCtx) return;

  const dist = state._lastDist || 100;
  const interval = Math.max(400, Math.min(2000, dist * 8)); // 400ms – 2s

  // Beep on
  const now = state.audioCtx.currentTime;
  state.gainNode.gain.cancelScheduledValues(now);
  state.gainNode.gain.setValueAtTime(0.18, now);
  state.gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.18);

  state._pulseTimer = setTimeout(() => {
    state._pulseTimer = null;
    if (state.navigating) pulseTone();
  }, interval);
}

function stopTone() {
  clearTimeout(state._pulseTimer);
  state._pulseTimer = null;
  if (state.gainNode) {
    const now = state.audioCtx.currentTime;
    state.gainNode.gain.setTargetAtTime(0, now, 0.05);
  }
  if (state.oscillator) {
    setTimeout(() => {
      try { state.oscillator.stop(); } catch(e) {}
      state.oscillator = null;
      state.panNode = null;
    }, 200);
  }
}

// ── Pan computation ────────────────────────────
function computePan(bearing) {
  if (state.heading === null) return 0;
  let diff = bearing - state.heading;
  while (diff > 180) diff -= 360;
  while (diff < -180) diff += 360;
  // Map -90..+90 to -1..1, clamp beyond that
  return Math.max(-1, Math.min(1, diff / 90));
}

// ── Speech ─────────────────────────────────────
function speak(text) {
  if (!window.speechSynthesis) return;
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 1.05;
  u.pitch = 1;
  speechSynthesis.speak(u);
}

// ── Geo maths ─────────────────────────────────
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const φ1 = lat1 * Math.PI / 180, φ2 = lat2 * Math.PI / 180;
  const dφ = (lat2 - lat1) * Math.PI / 180;
  const dλ = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(dλ/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function getBearing(lat1, lng1, lat2, lng2) {
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const φ1 = lat1 * Math.PI / 180, φ2 = lat2 * Math.PI / 180;
  const y = Math.sin(dLng) * Math.cos(φ2);
  const x = Math.cos(φ1)*Math.sin(φ2) - Math.sin(φ1)*Math.cos(φ2)*Math.cos(dLng);
  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

// ── Saved places ───────────────────────────────
function saveDestination(dest) {
  let saved = getSaved();
  // Deduplicate
  saved = saved.filter(s => !(Math.abs(s.lat - dest.lat) < 0.001 && Math.abs(s.lng - dest.lng) < 0.001));
  saved.unshift({ ...dest, savedAt: Date.now() });
  saved = saved.slice(0, 20); // keep 20
  localStorage.setItem('waypoint_saved', JSON.stringify(saved));
  renderSaved();
}

function getSaved() {
  try { return JSON.parse(localStorage.getItem('waypoint_saved') || '[]'); }
  catch { return []; }
}

function renderSaved() {
  const list = $('saved-list');
  const saved = getSaved();
  if (!saved.length) {
    list.innerHTML = '<div class="empty-msg">No saved places yet.<br>Navigate somewhere to save it.</div>';
    return;
  }
  list.innerHTML = saved.map((s, i) => {
    const name = s.name.split(',')[0];
    const sub = s.name.split(',').slice(1, 3).join(',').trim();
    return `<div class="place-card saved-card" data-idx="${i}" role="button" tabindex="0" aria-label="Navigate to ${name}">
      <div class="place-icon" aria-hidden="true">◈</div>
      <div class="place-info">
        <div class="place-name">${name}</div>
        <div class="place-sub">${sub}</div>
      </div>
      <div class="place-action">GO →</div>
    </div>`;
  }).join('');

  list.querySelectorAll('.place-card').forEach(card => {
    const handler = () => {
      const idx = parseInt(card.dataset.idx);
      const dest = getSaved()[idx];
      state.destination = dest;
      // Switch to nav page
      document.querySelector('[data-page="page-nav"]').click();
      destInput.value = dest.name.split(',').slice(0,2).join(', ');
      goBtn.disabled = false;
      setTimeout(() => startNavigation(), 300);
    };
    card.addEventListener('click', handler);
    card.addEventListener('keydown', e => { if (e.key === 'Enter') handler(); });
  });
}

// ── Explore nearby ─────────────────────────────
let activeType = 'amenity=cafe';
document.querySelectorAll('.type-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.type-chip').forEach(c => { c.classList.remove('active'); c.setAttribute('aria-pressed','false'); });
    chip.classList.add('active');
    chip.setAttribute('aria-pressed','true');
    activeType = chip.dataset.type;
  });
});

$('explore-btn').addEventListener('click', async () => {
  if (!state.pos) { toast('Waiting for GPS…'); return; }
  const btn = $('explore-btn');
  btn.innerHTML = '<span class="spinner"></span>SEARCHING…';
  btn.disabled = true;
  await fetchNearby(activeType);
  btn.textContent = 'FIND NEARBY';
  btn.disabled = false;
});

async function fetchNearby(typeStr) {
  const { lat, lng } = state.pos;
  const radius = 500;
  const [k, v] = typeStr.split('=');
  const query = `
    [out:json][timeout:10];
    node["${k}"="${v}"](around:${radius},${lat},${lng});
    out 10;
  `;
  try {
    const r = await fetch('https://overpass-api.de/api/interpreter', {
      method: 'POST',
      body: 'data=' + encodeURIComponent(query)
    });
    const d = await r.json();
    renderNearby(d.elements || []);
  } catch(e) {
    toast('Could not load nearby places');
    $('nearby-list').innerHTML = '<div class="empty-msg">Could not load nearby places.</div>';
  }
}

function renderNearby(elements) {
  const list = $('nearby-list');
  if (!elements.length) {
    list.innerHTML = '<div class="empty-msg">No places found nearby.</div>';
    return;
  }
  list.innerHTML = elements.map(el => {
    const name = el.tags.name || el.tags.amenity || el.tags.shop || 'Place';
    const dist = state.pos ? Math.round(haversine(state.pos.lat, state.pos.lng, el.lat, el.lon)) : '?';
    const icon = nearbyIcon(el.tags);
    return `<div class="place-card nearby-card" role="button" tabindex="0"
      data-lat="${el.lat}" data-lng="${el.lon}" data-name="${name}"
      aria-label="Navigate to ${name}, ${dist} meters away">
      <div class="place-icon" aria-hidden="true">${icon}</div>
      <div class="place-info">
        <div class="place-name">${name}</div>
        <div class="place-sub">${dist}m away</div>
      </div>
      <div class="place-action">GO →</div>
    </div>`;
  }).join('');

  list.querySelectorAll('.place-card').forEach(card => {
    const handler = () => {
      state.destination = {
        lat: parseFloat(card.dataset.lat),
        lng: parseFloat(card.dataset.lng),
        name: card.dataset.name
      };
      document.querySelector('[data-page="page-nav"]').click();
      destInput.value = card.dataset.name;
      goBtn.disabled = false;
      setTimeout(() => startNavigation(), 300);
    };
    card.addEventListener('click', handler);
    card.addEventListener('keydown', e => { if (e.key === 'Enter') handler(); });
  });
}

function nearbyIcon(tags) {
  if (tags.amenity === 'cafe') return '☕';
  if (tags.amenity === 'restaurant') return '🍽';
  if (tags.amenity === 'pharmacy') return '💊';
  if (tags.amenity === 'bank') return '🏦';
  if (tags.amenity === 'bus_stop') return '🚌';
  if (tags.shop === 'supermarket') return '🛒';
  return '◉';
}

// ── Init ───────────────────────────────────────
startGPS();
startCompass();
renderSaved();

// Keep location display current
setInterval(() => {
  if (state.pos) updateLocationDisplay();
  if (state.navigating) {
    state._lastDist = state.route.length ? haversine(
      state.pos.lat, state.pos.lng,
      state.route[state.stepIndex]?.lat, state.route[state.stepIndex]?.lng
    ) : null;
    updateNavigation();
  }
}, 1500);
</script>
